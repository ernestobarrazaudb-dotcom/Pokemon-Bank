<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Bank - Acceso Seguro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="body-inicio">
    <div class="contenedor-login">
        <img src="img/tema.png" alt="Logotipo" class="logo-superior">
        <div class="card card-login shadow-lg">
            <div class="card-body text-center">
                <h3 style="color: white; font-weight: bold; text-shadow: 1px 1px 3px #000;">Cajero Automático</h3>
                <form id="loginForm">
                    <input type="password" id="pinInput" class="form-control form-control-lg text-center mb-3" maxlength="4" placeholder="Ingrese su PIN" required>
                    <button type="button" onclick="validarAcceso()" class="btn btn-warning btn-block btn-lg" style="font-weight:bold; color:#3b4cca;">INGRESAR</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/validate.js/0.13.1/validate.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="js/storage.js"></script>
    <script src="js/transacciones.js"></script>
    <script src="js/validaciones.js"></script>
    <script src="js/interfaz.js"></script>
    <script src="js/reportes.js"></script>
    
    <script>
        // Soporte para teclado (Enter)
        document.getElementById('pinInput').addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                validarAcceso();
            }
        });

        function validarAcceso() {
            const pin = document.getElementById('pinInput').value;

            if (pin.length === 4) {
                const usuario = obtenerUsuario(); // Jala a Ash de storage.js

                if (usuario && usuario.pin === pin) {
                    swal({
                        title: '¡Acceso Concedido!',
                        text: `Bienvenido al sistema: ${usuario.nombre}`,
                        icon: 'success',
                        button: 'Entrar al Menú'
                    }).then(() => {
                        window.location.href = "menu.html";
                    });
                } else {
                    swal({
                        title: 'Error de PIN',
                        text: 'PIN incorrecto. Intente nuevamente.',
                        icon: 'error',
                        button: 'OK'
                    });
                }
            } else {
                swal({
                    title: 'Error de PIN',
                    text: 'Por favor ingrese los 4 dígitos de su clave.',
                    icon: 'error',
                    button: 'OK'
                });
            }
        }
    </script>
</body>
</html>
